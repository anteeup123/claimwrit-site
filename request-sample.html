<section class="sample-request-form">
    <form action="submit-request.php" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Contact Phone:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="sample-type">Sample Requested:</label>
        <select id="sample-type" name="sample-type" required>
            <option value="" disabled selected>Select a sample type</option>
            <option value="slip-trip-fall">Slip, Trip & Fall</option>
            <option value="assault-battery">Assault & Battery</option>
            <option value="bodily-injury-mva">Bodily Injury Motor Vehicle Accident</option>
            <option value="uninsured-motorist-mva">Uninsured Motorist Motor Vehicle Accident</option>
            <option value="premises-liability">Premises Liability</option>
            <option value="product-liability">Product Liability</option>
            <option value="dog-bite-injury">Dog Bite Injury</option>
        </select>

        <button type="submit" class="cta-button">Request Sample</button>
    </form>
