<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Upload Portal | ClaimWrit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Client Upload Portal</h1>
    <p>Securely upload documents for demand letter preparation and post-settlement support.</p>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="request-sample.html">Request a Sample</a></li>
      <li><a href="client-upload.html" class="active">Client Portal</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="sample-request-form">
    <form action="submit-request.php" method="POST" enctype="multipart/form-data">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Contact Phone (Optional):</label>
      <input type="tel" id="phone" name="phone" />

      <label for="sample-type">Document Type:</label>
      <select id="sample-type" name="sample-type" required>
        <option value="" disabled selected>Select a document type</option>
        <option value="hipaa-release">Signed HIPAA Release</option>
        <option value="billing-ledgers">Billing Ledgers</option>
        <option value="medical-notes">Medical Records</option>
        <option value="lien-documents">Lien Documents</option>
        <option value="loan-agreements">Pre-settlement Loan Agreements</option>
        <option value="settlement-statements">Settlement Statements</option>
      </select>

      <label for="upload-file">Upload File:</label>
      <input type="file" id="upload-file" name="upload-file" required />

      <button type="submit" class="cta-button">Submit File</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 ClaimWrit LLC. All rights reserved.</p>
  </footer>

</body>
</html>
